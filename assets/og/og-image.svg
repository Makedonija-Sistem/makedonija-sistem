<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1d3a"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d4ad4a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4ad4a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#goldGlow)"/>
  
  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="6" fill="#d4ad4a"/>
  
  <!-- Bottom border -->
  <rect x="0" y="624" width="1200" height="6" fill="#d4ad4a"/>
  
  <!-- Main title -->
  <text x="600" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="900" fill="#fdfbf5" text-anchor="middle" letter-spacing="-1">МАКЕДОНИЈА</text>
  
  <!-- Separator -->
  <rect x="500" y="270" width="200" height="3" fill="#d4ad4a"/>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="Georgia, serif" font-size="78" font-weight="700" fill="#e8c876" text-anchor="middle" letter-spacing="8">СИСТЕМ</text>
  
  <!-- Tagline -->
  <text x="600" y="430" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#a8b8c8" text-anchor="middle">Граѓанска · институционална · реформска</text>
  <text x="600" y="465" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#a8b8c8" text-anchor="middle">платформа за модерна македонска држава</text>
  
  <!-- Footer status -->
  <text x="600" y="560" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#d4ad4a" text-anchor="middle" letter-spacing="3">PUBLIC MVP · 0.1.0 · НАЦРТ-ВЕРЗИЈА</text>
  
  <!-- Macedonian flag colors accent -->
  <circle cx="100" cy="100" r="40" fill="#d4ad4a" opacity="0.15"/>
  <circle cx="1100" cy="530" r="60" fill="#d4ad4a" opacity="0.1"/>
</svg>
